name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
        env:
          # Required by tests/email.test.ts — fixed value, not a real secret
          EMAIL_TOKEN_SECRET: ci-test-secret-not-real

      - name: Type check
        run: npx tsc --noEmit
