name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel duplicate runs on the same ref when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint --max-warnings 0 src

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test
        env:
          # Test-only values; real secrets stay in Vercel/Supabase, never in CI.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-test
          SUPABASE_SERVICE_ROLE_KEY: service-role-test
          ANTHROPIC_API_KEY: anth-test
          OPENAI_API_KEY: openai-test
          EMAIL_TOKEN_SECRET: ci-test-secret-not-real
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Build
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL_TOKEN_SECRET: ${{ secrets.EMAIL_TOKEN_SECRET }}
          NEXT_PUBLIC_SITE_URL: https://entrium-ai-v2.vercel.app
          # Skip Sentry source-map upload during CI
          SENTRY_AUTH_TOKEN: ""
